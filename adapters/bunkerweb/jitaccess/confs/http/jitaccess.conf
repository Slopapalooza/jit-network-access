# JIT Network Access — http-context config (injected once per BunkerWeb instance).
#
# Simple mode keeps ALL state in these process-local shared dicts — no Redis.
# jit_nonces is DEDICATED to spent-nonce single-use claims and is deliberately
# separate from jit_grants and from BunkerWeb's ban dict, so a nonce-claim flood
# can never LRU-evict live grants or bans (SECURITY-REVIEW H5).
#
# Sizes are generous for a self-host; each grant/nonce entry is small.
lua_shared_dict jit_grants 16m;
lua_shared_dict jit_nonces 16m;

# HARDENED (M6): when a shared Redis backend is configured these dicts become a
# local cache in front of it; declarations stay the same.
