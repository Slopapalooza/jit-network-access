# JIT Network Access — per-server config.
#
# $is_jit_allowed mirrors the whitelist plugin's $is_whitelisted pattern: the
# access-phase Lua sets it to "yes" once a grant is confirmed, so ModSecurity/CRS
# and downstream config can see the decision early. It defaults to "no".
set $is_jit_allowed 'no';

# Fail-closed note (SECURITY-REVIEW C1 / DESIGN §11 R1): the real gate is the
# self-pcall'd access() in jitaccess.lua, which denies on ANY internal error
# rather than letting BunkerWeb's chain fall through to "allow". A conf-layer
# default-deny assertion for protected locations is added in M1 alongside the
# full access phase, so that even a plugin that fails to LOAD fails closed.
